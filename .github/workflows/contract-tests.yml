name: Contract Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: pact-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACT_CONSUMER_VERSION: ${{ github.sha }}
  PACT_PROVIDER_VERSION: ${{ github.sha }}
  PACT_CONSUMER_TAG: main

jobs:
  consumer-tests:
    name: Pact — consumer tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Consumer tests
        run: npm run test:consumer

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-files
          path: pacts/*.json
          if-no-files-found: error

  provider-verification:
    name: Pact — publish & verify
    runs-on: ubuntu-latest
    needs: consumer-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare .env
        run: cp .env.example .env

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download pact files
        uses: actions/download-artifact@v4
        with:
          name: pact-files
          path: pacts

      - name: Start TestFlow + Pact Broker
        run: docker compose up -d postgres pact-broker testflow

      - name: Wait for services
        run: |
          echo "Waiting for TestFlow (localhost:5050)..."
          for i in $(seq 1 60); do
            curl -sf http://localhost:5050/health && break
            sleep 2
          done
          curl -sf http://localhost:5050/health

          echo "Waiting for Pact Broker (localhost:9292)..."
          for i in $(seq 1 60); do
            curl -sf -u pact:pact http://localhost:9292/diagnostic/status/heartbeat && break
            sleep 2
          done
          curl -sf -u pact:pact http://localhost:9292/diagnostic/status/heartbeat

      - name: Publish pacts
        run: npm run pact:publish

      - name: Provider verification
        run: npm run pact:verify

      - name: can-i-deploy (all consumers)
        run: npm run pact:can-i-deploy

      - name: Docker logs on failure
        if: failure()
        run: docker compose logs --no-color

  deploy:
    name: Deploy
    needs: provider-verification
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy gate passed
        run: |
          echo "Contract tests passed for commit ${{ github.sha }}."
          echo "Substitua este step pelo deploy real (ex.: kubectl, SSH, cloud CLI)."
